# Watchlist YTD Equal-Weighted Index
# ウォッチリスト年初来等ウェイト指数
#
# index_today = base_value * average(adjusted_price_today / adjusted_price_base)
#
# Notes:
# - adjusted_price は分割・配当等を調整済みの価格を想定。
# - base_date は暦上の基準日。休場日の場合、基準価格日は base_price_date_policy に従う。
# - 後から銘柄を追加した場合も、原則として base_date からの倍率を再計算して指数に含める。
# - この指数は「現在のウォッチリスト構成銘柄の年初来等ウェイトパフォーマンス」を表す。

index:
  name: Watchlist YTD Equal-Weighted Index
  name_ja: ウォッチリスト年初来等ウェイト指数
  base_value: 1000
  base_date: 2026-01-01
  base_price_date_policy: first_trading_day_on_or_after_base_date
  price_type: adjusted_close
  currency: JPY
  formula: "base_value * average(adjusted_price_today / adjusted_price_base)"
  methodology:
    weighting: equal_weight
    interpretation: current_constituents_ytd_equal_weighted_performance
    constituent_add_policy: recompute_from_base_date
    rebalance: implicit_daily_equal_average

