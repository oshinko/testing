# Watchlist Equal-Invested Hold Index
# ウォッチリスト初期同額投資指数
#
# index_today = 1000 * average(adjusted_price_today / adjusted_price_base)
#
# Notes:
# - adjusted_price は分割・配当等を調整済みの価格を想定。
# - base_date の adjusted_price を 1.0 として各銘柄の倍率を計算。
# - 各銘柄を初期同額投資として扱うため、時価総額や株数では加重しない。
# - constituents に追加した銘柄だけで平均する。

index:
  name: Watchlist Equal-Invested Hold Index
  name_ja: ウォッチリスト初期同額投資指数
  base_value: 1000
  base_date: null
  currency: null
  formula: "1000 * average(adjusted_price_today / adjusted_price_base)"

constituents: []
# Example:
# constituents:
#   - symbol: AAPL
#     name: Apple Inc.
#     market: US
#     exchange: NASDAQ
#     asset_type: equity
#     note: null
#   - symbol: 7203.T
#     name: Toyota Motor Corporation
#     market: JP
#     exchange: TSE
#     asset_type: equity
#     note: null
