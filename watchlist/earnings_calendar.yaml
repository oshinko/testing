# Earnings disclosure calendar for watchlist constituents
# ウォッチリスト構成銘柄の決算開示日時カレンダー
#
# Purpose:
# - Track scheduled earnings disclosure date/time for each watchlist company.
# - Keep source URL and confidence so that dates can be verified and refreshed.
#
# Source policy:
# - Prefer company IR calendar pages when they disclose exact date/time.
# - Use JPX/TSE financial announcement schedule as a cross-check or fallback.
# - Mark tentative items when only month/late-month guidance is available.

calendar:
  name: Watchlist Earnings Disclosure Calendar
  name_ja: ウォッチリスト決算開示日時カレンダー
  timezone: Asia/Tokyo
  target_watchlist: watchlist/watchlist.yaml
  generated_at: null
  source_policy:
    preferred: company_ir_calendar
    fallback: jpx_financial_announcement_schedule
    require_source_url: true
    require_confidence: true

fields:
  - symbol
  - ticker
  - name
  - fiscal_period
  - disclosure_type
  - scheduled_at
  - date_precision
  - confidence
  - source_name
  - source_url
  - checked_at
  - note

events: []
# Example:
# events:
#   - symbol: "4063"
#     ticker: 4063.T
#     name: 信越化学工業
#     fiscal_period: 2026-03
#     disclosure_type: full_year_results
#     scheduled_at: "2026-04-28T15:30:00+09:00"
#     date_precision: datetime
#     confidence: official_company_ir
#     source_name: company_ir_calendar
#     source_url: "https://www.shinetsu.co.jp/jp/ir/ir-calendar/"
#     checked_at: "2026-05-02T00:00:00+09:00"
#     note: null
